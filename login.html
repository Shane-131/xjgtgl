<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="新疆高铁国际旅行社会员登录 - 登录后查看专属路线和优惠。">
  <title>登录 | 新疆高铁国际旅行社</title>

  <!-- 国内友好字体：系统中文字体 -->
  <style>
    @font-face {
      font-family: 'Geist';
      src: local('Geist'), local('system-ui');
      font-weight: 400 600;
      font-display: swap;
    }
  </style>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              ink: '#1a2a3a',
              teal: '#0d9488',
              'teal-light': '#14b8a6',
              gold: '#d4a574',
              'gold-light': '#e8cfa6',
              warm: '#fafaf8',
            }
          },
          fontFamily: {
            serif: ['Noto Serif SC', 'serif'],
            sans: ['Noto Sans SC', 'sans-serif'],
            display: ['Geist', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <script src="assets/js/icons.js"></script>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-brand-warm text-brand-ink font-sans antialiased">

  <!-- 导航栏 -->
  <nav id="mainNav" class="nav-glass fixed top-0 left-0 right-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16 md:h-20">
        <a href="index.html" class="flex items-center group">
          <img src="assets/images/logo.png" alt="新疆高铁国旅" class="h-14 md:h-16 w-auto transition-transform duration-300 group-hover:scale-105">
        </a>
        <div class="hidden md:flex items-center gap-8">
          <a href="index.html" class="text-sm font-medium text-brand-ink/70 hover:text-brand-teal transition-colors duration-300">首页</a>
          <a href="about.html" class="text-sm font-medium text-brand-ink/70 hover:text-brand-teal transition-colors duration-300">关于我们</a>
          <a href="routes.html" class="text-sm font-medium text-brand-ink/70 hover:text-brand-teal transition-colors duration-300">路线推荐</a>
          <a href="login.html" class="btn-primary text-sm !py-2 !px-5">登录 <i class="ph ph-arrow-right text-sm"></i></a>
        </div>
        <button id="menuToggle" class="md:hidden relative w-10 h-10 flex items-center justify-center" aria-label="菜单">
          <div class="flex flex-col gap-1.5">
            <span class="block w-5 h-px bg-brand-ink transition-all duration-300"></span>
            <span class="block w-5 h-px bg-brand-ink transition-all duration-300"></span>
          </div>
        </button>
      </div>
    </div>
  </nav>

  <div id="mobileMenu" class="hidden fixed inset-0 z-40 bg-brand-warm/95 backdrop-blur-xl flex flex-col items-center justify-center gap-8">
    <a href="index.html" class="text-2xl font-serif text-brand-ink/70">首页</a>
    <a href="about.html" class="text-2xl font-serif text-brand-ink/70">关于我们</a>
    <a href="routes.html" class="text-2xl font-serif text-brand-ink/70">路线推荐</a>
    <a href="login.html" class="btn-primary text-lg mt-4">登录</a>
  </div>

  <!-- 主内容 -->
  <main class="page-enter min-h-[100dvh] flex items-center justify-center pt-20 pb-12 px-4">
    <div class="w-full max-w-md">

      <!-- 登录卡片 -->
      <div class="bg-white rounded-3xl shadow-card inner-highlight p-8 md:p-10">

        <!-- Logo -->
        <div class="text-center mb-8">
          <a href="index.html" class="inline-flex justify-center mb-6">
            <img src="assets/images/logo.png" alt="新疆高铁国旅" class="h-12 w-auto">
          </a>
          <h1 class="font-serif text-2xl tracking-tight mb-1">欢迎回来</h1>
          <p class="text-brand-ink/40 text-sm">登录您的会员账户</p>
        </div>

        <!-- Tab 切换 -->
        <div class="flex bg-brand-warm rounded-full p-1 mb-8">
          <button id="tabLogin" class="tab-btn flex-1 py-2.5 text-sm font-medium rounded-full bg-white text-brand-ink shadow-sm transition-all duration-300">
            登录
          </button>
          <button id="tabRegister" class="tab-btn flex-1 py-2.5 text-sm font-medium rounded-full text-brand-ink/45 hover:text-brand-ink/70 transition-all duration-300">
            注册
          </button>
        </div>

        <!-- 登录表单 -->
        <form id="loginForm" class="space-y-5">
          <!-- 手机号 -->
          <div>
            <label for="phone" class="block text-sm font-medium text-brand-ink/70 mb-2">手机号码</label>
            <div class="relative">
              <div class="absolute left-4 top-1/2 -translate-y-1/2 text-brand-ink/25">
                <i class="ph ph-device-mobile text-lg"></i>
              </div>
              <input
                type="tel"
                id="phone"
                name="phone"
                placeholder="请输入手机号码"
                maxlength="11"
                class="w-full h-12 pl-11 pr-4 rounded-xl border border-brand-ink/8 bg-brand-warm text-sm text-brand-ink placeholder:text-brand-ink/20 outline-none transition-all duration-300 focus:border-brand-teal focus:ring-4 focus:ring-brand-teal/5"
              >
            </div>
          </div>

          <!-- 验证码 -->
          <div>
            <label for="code" class="block text-sm font-medium text-brand-ink/70 mb-2">验证码</label>
            <div class="flex gap-3">
              <div class="relative flex-1">
                <div class="absolute left-4 top-1/2 -translate-y-1/2 text-brand-ink/25">
                  <i class="ph ph-password text-lg"></i>
                </div>
                <input
                  type="text"
                  id="code"
                  name="code"
                  placeholder="请输入验证码"
                  maxlength="6"
                  class="w-full h-12 pl-11 pr-4 rounded-xl border border-brand-ink/8 bg-brand-warm text-sm text-brand-ink placeholder:text-brand-ink/20 outline-none transition-all duration-300 focus:border-brand-teal focus:ring-4 focus:ring-brand-teal/5"
                >
              </div>
              <button
                type="button"
                id="sendCodeBtn"
                class="shrink-0 h-12 px-4 rounded-xl bg-brand-teal/10 text-brand-teal text-sm font-medium hover:bg-brand-teal/15 transition-all duration-300"
              >
                获取验证码
              </button>
            </div>
          </div>

          <!-- 登录按钮 -->
          <button
            type="submit"
            class="btn-primary w-full justify-center text-base !py-3 mt-2"
          >
            登录
          </button>

          <!-- 协议 -->
          <p class="text-center text-xs text-brand-ink/30 leading-relaxed">
            登录即表示同意
            <a href="#" class="text-brand-teal/60 hover:text-brand-teal transition-colors duration-300">服务协议</a>
            和
            <a href="#" class="text-brand-teal/60 hover:text-brand-teal transition-colors duration-300">隐私政策</a>
          </p>
        </form>

        <!-- 注册表单 (默认隐藏) -->
        <form id="registerForm" class="hidden space-y-5">
          <div>
            <label for="regPhone" class="block text-sm font-medium text-brand-ink/70 mb-2">手机号码</label>
            <div class="relative">
              <div class="absolute left-4 top-1/2 -translate-y-1/2 text-brand-ink/25">
                <i class="ph ph-device-mobile text-lg"></i>
              </div>
              <input
                type="tel"
                id="regPhone"
                name="regPhone"
                placeholder="请输入手机号码"
                maxlength="11"
                class="w-full h-12 pl-11 pr-4 rounded-xl border border-brand-ink/8 bg-brand-warm text-sm text-brand-ink placeholder:text-brand-ink/20 outline-none transition-all duration-300 focus:border-brand-teal focus:ring-4 focus:ring-brand-teal/5"
              >
            </div>
          </div>
          <div>
            <label for="regName" class="block text-sm font-medium text-brand-ink/70 mb-2">姓名</label>
            <div class="relative">
              <div class="absolute left-4 top-1/2 -translate-y-1/2 text-brand-ink/25">
                <i class="ph ph-user text-lg"></i>
              </div>
              <input
                type="text"
                id="regName"
                name="regName"
                placeholder="请输入您的姓名"
                class="w-full h-12 pl-11 pr-4 rounded-xl border border-brand-ink/8 bg-brand-warm text-sm text-brand-ink placeholder:text-brand-ink/20 outline-none transition-all duration-300 focus:border-brand-teal focus:ring-4 focus:ring-brand-teal/5"
              >
            </div>
          </div>
          <div>
            <label for="regCode" class="block text-sm font-medium text-brand-ink/70 mb-2">验证码</label>
            <div class="flex gap-3">
              <div class="relative flex-1">
                <div class="absolute left-4 top-1/2 -translate-y-1/2 text-brand-ink/25">
                  <i class="ph ph-password text-lg"></i>
                </div>
                <input
                  type="text"
                  id="regCode"
                  name="regCode"
                  placeholder="请输入验证码"
                  maxlength="6"
                  class="w-full h-12 pl-11 pr-4 rounded-xl border border-brand-ink/8 bg-brand-warm text-sm text-brand-ink placeholder:text-brand-ink/20 outline-none transition-all duration-300 focus:border-brand-teal focus:ring-4 focus:ring-brand-teal/5"
                >
              </div>
              <button
                type="button"
                id="sendRegCodeBtn"
                class="shrink-0 h-12 px-4 rounded-xl bg-brand-teal/10 text-brand-teal text-sm font-medium hover:bg-brand-teal/15 transition-all duration-300"
              >
                获取验证码
              </button>
            </div>
          </div>
          <button
            type="submit"
            class="btn-primary w-full justify-center text-base !py-3 mt-2"
          >
            注册
          </button>
          <p class="text-center text-xs text-brand-ink/30 leading-relaxed">
            注册即表示同意
            <a href="#" class="text-brand-teal/60 hover:text-brand-teal transition-colors duration-300">服务协议</a>
            和
            <a href="#" class="text-brand-teal/60 hover:text-brand-teal transition-colors duration-300">隐私政策</a>
          </p>
        </form>
      </div>

      <!-- 底部链接 -->
      <p class="text-center mt-6 text-sm text-brand-ink/30">
        <a href="index.html" class="hover:text-brand-teal transition-colors duration-300">返回首页</a>
      </p>
    </div>
  </main>

  <!-- 登录页脚本 -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Tab 切换
      const tabLogin = document.getElementById('tabLogin');
      const tabRegister = document.getElementById('tabRegister');
      const loginForm = document.getElementById('loginForm');
      const registerForm = document.getElementById('registerForm');

      function switchTab(activeTab, inactiveTab, showForm, hideForm) {
        activeTab.classList.add('bg-white', 'text-brand-ink', 'shadow-sm');
        activeTab.classList.remove('text-brand-ink/45');
        inactiveTab.classList.remove('bg-white', 'text-brand-ink', 'shadow-sm');
        inactiveTab.classList.add('text-brand-ink/45');
        showForm.classList.remove('hidden');
        hideForm.classList.add('hidden');
      }

      tabLogin.addEventListener('click', () => switchTab(tabLogin, tabRegister, loginForm, registerForm));
      tabRegister.addEventListener('click', () => switchTab(tabRegister, tabLogin, registerForm, loginForm));

      // 验证码倒计时
      function setupCodeBtn(btnId) {
        const btn = document.getElementById(btnId);
        let countdown = 0;
        let timer = null;

        btn.addEventListener('click', () => {
          if (countdown > 0) return;

          countdown = 60;
          btn.textContent = `${countdown}秒后重发`;
          btn.style.opacity = '0.6';
          btn.style.pointerEvents = 'none';

          timer = setInterval(() => {
            countdown--;
            if (countdown <= 0) {
              clearInterval(timer);
              btn.textContent = '获取验证码';
              btn.style.opacity = '1';
              btn.style.pointerEvents = '';
            } else {
              btn.textContent = `${countdown}秒后重发`;
            }
          }, 1000);
        });
      }

      setupCodeBtn('sendCodeBtn');
      setupCodeBtn('sendRegCodeBtn');

      // 表单提交
      loginForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const phone = document.getElementById('phone').value.trim();
        const code = document.getElementById('code').value.trim();
        if (!phone || phone.length < 11) {
          alert('请输入正确的手机号码');
          return;
        }
        if (!code || code.length < 4) {
          alert('请输入验证码');
          return;
        }
        alert('登录功能开发中，敬请期待！');
      });

      registerForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const phone = document.getElementById('regPhone').value.trim();
        const name = document.getElementById('regName').value.trim();
        const code = document.getElementById('regCode').value.trim();
        if (!phone || phone.length < 11) {
          alert('请输入正确的手机号码');
          return;
        }
        if (!name) {
          alert('请输入您的姓名');
          return;
        }
        if (!code || code.length < 4) {
          alert('请输入验证码');
          return;
        }
        alert('注册功能开发中，敬请期待！');
      });
    });
  </script>

  <script src="assets/js/main.js"></script>
</body>
</html>
