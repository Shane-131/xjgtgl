            <a href="about.html" class="text-sm text-brand-ink/45 hover:text-brand-teal transition-colors duration-300">关于我们</a>

        <div>

          <div class="flex flex-col gap-2.5">
            <span class="text-sm text-brand-ink/45 flex items-center gap-2"><i class="ph ph-phone text-brand-teal"></i>15809919935</span>
            <span class="text-sm text-brand-ink/45 flex items-center gap-2"><i class="ph ph-envelope text-brand-teal"></i>471181909@qq.com</span>
            <span class="text-sm text-brand-ink/45 flex items-center gap-2"><i class="ph ph-map-pin text-brand-teal"></i>乌鲁木齐市新市区北京南路895号豪威大厦21层</span>
          </div>

      <div class="mt-12 pt-6 border-t border-brand-ink/5 flex flex-col sm:flex-row items-center justify-between gap-4">

        <p class="text-xs text-brand-ink/30">备案号: 新ICP备XXXXXXXX号</p>

  <script src="assets/js/route-data.js"></script>
  <script src="assets/js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const id = parseInt(params.get('id')) || 1;
      const route = ROUTE_DATA.find(r => r.id === id) || ROUTE_DATA[0];

      if (!route) return;

      document.title = route.title + ' | 新疆高铁国际旅行社';

      const lowestPrice = Math.min(...route.prices.map(p => p.price));
      const priceDisplay = route.prices.length === 1
        ? '¥' + route.prices[0].price.toLocaleString()
        : '¥' + lowestPrice.toLocaleString() + ' 起';

      const main = document.getElementById('detailContent');
      main.innerHTML = `
        <!-- Hero 图 -->
        <section class="relative h-[50vh] md:h-[60vh] overflow-hidden">
          <img src="${route.image}" alt="${route.title}" class="w-full h-full object-cover">
          <div class="absolute inset-0 bg-gradient-to-t from-brand-ink/70 via-brand-ink/20 to-transparent"></div>
          <div class="absolute bottom-0 left-0 right-0 p-6 md:p-12">
            <div class="max-w-7xl mx-auto">
              <a href="routes.html" class="inline-flex items-center gap-1.5 text-white/60 hover:text-white text-sm mb-4 transition-colors duration-300">
                <i class="ph ph-arrow-left"></i> 返回路线列表
              </a>
              <div class="flex flex-wrap gap-2 mb-4">
                ${route.tags.map(t => `<span class="px-3 py-1 rounded-full bg-white/15 backdrop-blur-md text-white text-xs font-medium">${t}</span>`).join('')}
              </div>
              <h1 class="font-serif text-3xl md:text-5xl lg:text-6xl text-white tracking-tighter leading-tight mb-2">
                ${route.title}
              </h1>
              <p class="text-white/60 text-lg">${route.subtitle}</p>
            </div>
          </div>
        </section>

        <!-- 关键信息栏 -->
        <section class="py-0 -mt-10 relative z-10">
          <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="bg-white rounded-3xl shadow-card inner-highlight p-6 md:p-8 grid grid-cols-2 md:grid-cols-4 gap-6">
              <div class="text-center md:text-left">
                <p class="text-xs text-brand-ink/35 mb-1">行程天数</p>
                <p class="font-display text-xl font-semibold text-brand-ink">${route.duration}</p>
              </div>
              <div class="text-center md:text-left">
                <p class="text-xs text-brand-ink/35 mb-1">参考价格</p>
                <p class="font-display text-xl font-semibold text-brand-teal">${priceDisplay}</p>
              </div>
              <div class="text-center md:text-left">
                <p class="text-xs text-brand-ink/35 mb-1">团队规模</p>
                <p class="font-display text-xl font-semibold text-brand-ink">MINI 6人团</p>
              </div>
              <div class="text-center md:text-left">
                <p class="text-xs text-brand-ink/35 mb-1">出行方式</p>
                <p class="font-display text-xl font-semibold text-brand-ink">1+1头等舱</p>
              </div>
            </div>
          </div>
        </section>

        <!-- 核心景点 -->
        <section class="py-16 md:py-24">
          <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="max-w-3xl">
              <h2 class="font-serif text-2xl md:text-4xl tracking-tight mb-6">核心景点</h2>
              <p class="text-brand-ink/60 text-lg leading-relaxed">${route.highlights}</p>
            </div>
          </div>
        </section>

        <!-- 行程特色 -->
        <section class="pb-16 md:pb-24">
          <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <h2 class="font-serif text-2xl md:text-4xl tracking-tight mb-10">行程特色与赠送</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
              ${route.features.map((f, i) => `
                <div class="bg-white rounded-3xl p-6 md:p-8 shadow-card inner-highlight transition-brand hover:shadow-card-hover group">
                  <div class="w-10 h-10 rounded-xl bg-brand-teal/10 flex items-center justify-center mb-4 transition-colors duration-300 group-hover:bg-brand-teal/15">
                    <span class="font-display text-sm font-semibold text-brand-teal">0${i + 1}</span>
                  </div>
                  <p class="text-brand-ink/65 text-sm leading-relaxed">${f}</p>
                </div>
              `).join('')}
            </div>
          </div>
        </section>

        ${route.accommodation.length > 0 ? `
        <!-- 住宿安排 -->
        <section class="pb-16 md:pb-24">
          <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <h2 class="font-serif text-2xl md:text-4xl tracking-tight mb-10">住在风景</h2>
            <div class="space-y-4">
              ${route.accommodation.map(a => `
                <div class="bg-white rounded-2xl p-5 md:p-6 shadow-card inner-highlight flex items-start gap-4">
                  <div class="w-8 h-8 rounded-lg bg-brand-gold/10 flex items-center justify-center shrink-0 mt-0.5">
                    <i class="ph ph-bed text-brand-gold"></i>
                  </div>
                  <p class="text-brand-ink/60 text-sm leading-relaxed">${a}</p>
                </div>
              `).join('')}
            </div>
          </div>
        </section>
        ` : ''}

        <!-- 价格详情 -->
        <section class="pb-16 md:pb-24">
          <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <h2 class="font-serif text-2xl md:text-4xl tracking-tight mb-10">班期与价格</h2>
            <div class="bg-white rounded-3xl shadow-card inner-highlight overflow-hidden">
              <div class="overflow-x-auto">
                <table class="w-full text-sm">
                  <thead>
                    <tr class="border-b border-brand-ink/5">
                      <th class="text-left p-5 md:p-6 font-medium text-brand-ink/50 text-xs uppercase">班期</th>
                      <th class="text-right p-5 md:p-6 font-medium text-brand-ink/50 text-xs uppercase">价格</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${route.prices.map(p => `
                      <tr class="border-b border-brand-ink/3 last:border-0">
                        <td class="p-5 md:p-6 text-brand-ink/70">${p.period}</td>
                        <td class="p-5 md:p-6 text-right">
                          <span class="font-display text-base font-semibold text-brand-teal">¥${p.price.toLocaleString()}</span>
                          <span class="text-brand-ink/35 text-xs ml-1">/人</span>
                        </td>
                      </tr>
                    `).join('')}
                  </tbody>
                </table>
              </div>
            </div>
            <p class="text-brand-ink/30 text-xs mt-4 text-center">具体行程安排及价格请以最终报名确认单及官方客服沟通为准。扫码可查看更多图文详情。</p>
          </div>
        </section>

        <!-- CTA -->
        <section class="pb-24 md:pb-32">
          <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="bg-brand-ink rounded-3xl p-8 md:p-14 text-center relative overflow-hidden">
              <div class="absolute top-0 right-0 w-64 h-64 opacity-5 pointer-events-none">
                <svg viewBox="0 0 256 256" fill="none"><circle cx="128" cy="128" r="120" stroke="white" stroke-width="1"/><circle cx="128" cy="128" r="90" stroke="white" stroke-width="1"/><circle cx="128" cy="128" r="60" stroke="white" stroke-width="1"/></svg>
              </div>
              <div class="relative z-10">
                <h2 class="font-serif text-2xl md:text-4xl text-white tracking-tight mb-3">对这个路线感兴趣？</h2>
                <p class="text-white/50 mb-8">联系我们的旅行顾问，获取详细行程和专属优惠</p>
                <a href="about.html" class="btn-primary !bg-brand-teal hover:!bg-brand-teal-light text-base">
                  <i class="ph ph-phone"></i> 咨询路线
                </a>
              </div>
            </div>
          </div>
        </section>
      `;
    });
